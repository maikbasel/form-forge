# cargo-deny configuration
# See: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # NOTE: keep this list in sync with .cargo/audit.toml (read by the
    # rustsec/audit-check job in security-audit.yml). Patchable advisories are
    # fixed by bumping Cargo.lock, NOT ignored.

    # rsa: Marvin Attack timing side-channel. No fixed upstream release exists.
    # Only a Cargo.lock entry via sqlx-mysql's optional driver; we use Postgres
    # only, so rsa is never compiled into any target.
    "RUSTSEC-2023-0071",

    # rustls-webpki 0.101.7 / 0.102.8: fixes only exist in the 0.103.x line.
    # Pulled by vestigial TLS stacks we don't control (rustls 0.21 via the AWS
    # SDK's hyper-rustls 0.24; rustls 0.22 via libsql's hyper-rustls 0.25). The
    # active S3 TLS path (rustls 0.23 / rustls-webpki 0.103.13) is patched.
    "RUSTSEC-2026-0049",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",

    # rustls-pemfile is unmaintained but used only in dev deps via testcontainers
    # Migration to rustls-pki-types would require updating testcontainers
    "RUSTSEC-2025-0134",

    # Tauri 2.x transitive deps: gtk-rs GTK3 bindings are unmaintained (replaced by gtk4-rs)
    # These are required by webkit2gtk which is Tauri's Linux WebView backend
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # glib VariantStrIter unsoundness — same GTK3 stack via Tauri
    "RUSTSEC-2024-0429",

    # proc-macro-error is unmaintained, used by Tauri's macros
    "RUSTSEC-2024-0370",

    # fxhash is unmaintained, used by Tauri transitive deps
    "RUSTSEC-2025-0057",

    # unic-* crates are unmaintained, used by wry (Tauri's WebView)
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",

    # bincode is unmaintained, used by Tauri transitive deps
    "RUSTSEC-2025-0141",

    # quick-xml 0.39.4 DoS advisories (unbounded namespace alloc / quadratic
    # attribute check). Fix is 0.41.0 (breaking). Pulled by plist 1.9.0 <-
    # tauri-utils <- Tauri 2.x, which pins the 0.39 line. Only used to parse
    # trusted .plist files at Tauri build/config time, never untrusted remote
    # XML, so neither DoS vector is reachable. Revisit when Tauri/plist bump.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
# Allow commonly used permissive open source licenses
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    # Tauri 2.x transitive deps (kuchikiki, selectors via wry)
    "MPL-2.0",
    # Tauri 2.x transitive deps
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# Allow licenses for workspace members without explicit license field
[[licenses.clarify]]
name = "form-forge-api"
expression = "MIT OR Apache-2.0"
license-files = []


name: Security Audit

on:
  schedule:
    - cron: '0 0 * * *'
  # Allow on-demand runs (e.g. to verify advisory fixes without waiting for the
  # daily cron) and runs when the dependency graph or audit policy changes.
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '.cargo/audit.toml'
      - 'deny.toml'
      - '.github/workflows/security-audit.yml'

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Audit dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}